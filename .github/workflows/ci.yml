name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Type check (svelte-check)
        run: npm run check

      - name: Build Chrome (MV3)
        run: npm run build

      - name: Build Firefox (MV2)
        run: npm run build:firefox
